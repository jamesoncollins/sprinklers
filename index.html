<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sprinklers Planner</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <h1>Sprinklers Planner</h1>
        <div class="actions">
          <button id="new-project">New Project</button>
          <button id="save-project">Save JSON</button>
          <label class="file-btn">Load JSON<input id="load-project" type="file" accept="application/json" /></label>
        </div>
      </header>

      <main class="layout">
        <aside class="panel">
          <h2>Catalog / Project</h2>
          <label class="file-btn block">Import CSV Catalog<input id="load-catalog" type="file" accept=".csv,text/csv" /></label>
          <div id="catalog-status" class="status">No catalog loaded.</div>

          <div class="filters">
            <input id="filter-text" placeholder="Filter manufacturer/model/nozzle" />
            <input id="pressure-psi" type="number" value="45" min="1" step="1" />
          </div>

          <div id="catalog-list" class="list"></div>
        </aside>

        <section class="canvas" aria-label="Map canvas">
          <div class="canvas-placeholder">Map canvas placeholder (Phase 2)</div>
        </section>

        <aside class="panel">
          <h2>Selected Sprinkler</h2>
          <div id="selected-sprinkler">No sprinkler selected yet.</div>
          <h3>Lookup Result</h3>
          <pre id="lookup-result">Select catalog row to view interpolation.</pre>
        </aside>
      </main>
    </div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
