<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sprinklers Planner</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <h1>Sprinklers Planner</h1>
        <div class="actions">
          <button id="new-project">New Project</button>
          <button id="save-project">Save JSON</button>
          <label class="file-btn">
            Load JSON
            <input id="load-project" type="file" accept="application/json" />
          </label>
        </div>
      </header>

      <main class="layout">
        <aside class="panel">
          <h2>Catalog / Project</h2>
          <label class="field-label file-btn">
            Import CSV Catalog
            <input id="load-catalog" type="file" accept=".csv,text/csv" />
          </label>
          <p id="catalog-status" class="status-text">No catalog loaded.</p>

          <div class="field-group">
            <label for="manufacturer-select">Manufacturer</label>
            <select id="manufacturer-select"></select>
          </div>

          <div class="field-group">
            <label for="head-select">Head Model</label>
            <select id="head-select"></select>
          </div>

          <div class="field-group">
            <label for="nozzle-select">Nozzle Model</label>
            <select id="nozzle-select"></select>
          </div>

          <div class="field-group">
            <label for="pressure-input">Pressure (PSI)</label>
            <input id="pressure-input" type="number" min="1" step="0.1" value="45" />
          </div>

          <button id="lookup-performance" class="full-width">Lookup Performance</button>
          <p id="lookup-result" class="status-text">Awaiting lookup.</p>
        </aside>

        <section class="canvas" aria-label="Map canvas">
          <div class="canvas-placeholder">Map canvas placeholder (Phase 2)</div>
        </section>

        <aside class="panel">
          <h2>Selected Sprinkler</h2>
          <p>Select a sprinkler on the map to edit details.</p>
        </aside>
      </main>
    </div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
